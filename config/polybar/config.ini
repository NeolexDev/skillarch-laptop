[colors]
background = #80000000
background-alt = #80333333
foreground = #E0E0E0
primary = #FFFFFF
secondary = #B0B0B0
alert = #808080
disabled = #606060
warning = #A0A0A0

[bar/main]
width = 100%
height = 30pt
bottom = true
radius = 6
opacity = 0.1
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-top-size = 5pt
border-bottom-size = 0pt
border-left-size = 5pt
border-right-size = 5pt

border-color = #00000000

padding-left = 0
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.disabled}
; icons normal size
font-0 = "JetBrainsMono Nerd Font:style=Normal:size=11;3"


modules-left = i3 tidal-prev tidal-play-pause tidal-next tidal
modules-right = timew systray filesystem pulseaudio  memory cpu networketh date 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

monitor = ${env:MONITOR:}
monitor-strict = true

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

override-redirect = false

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/timew]
type = custom/script
exec = timew | head -n1 | sed 's/Tracking/Doing:/'
interval = 5
format = <label>

[module/tidal]
type = custom/script
tail = true
fixed-center = true
interval = 1
; prefix symbol is shown before the text
format-prefix = "%{T2}%{F#E0E0E0}ÔÄĀ%{F-}%{T-}  "
format = <label>
exec = ~/.config/polybar/scripts/scroll_tidal_status.sh

[module/tidal-prev]
type = custom/script
; nf-fa-step_backward (U+F048) - Nerd Font compatible, UTF-8 via printf
exec = echo -e "\\uf0d9"
format = <label>
click-left = /home/neolex/.config/polybar/scripts/tidal.sh previous

[module/tidal-play-pause]
type = custom/ipc
hook-0 = echo -e "%{F#8DB600}\\uf04b%{F-}"
hook-1 = echo -e "%{F#ed808a}\\uf04c%{F-}"
format = <label>
initial = 1
click-left = /home/neolex/.config/polybar/scripts/tidal.sh playpause

[module/tidal-next]
type = custom/script
; nf-fa-step_forward (U+F051) - Nerd Font compatible, UTF-8 via printf
exec = echo -e "\\uf0da"
format = <label>
click-left = /home/neolex/.config/polybar/scripts/tidal.sh next


[module/i3]
type = internal/i3
pin-workspaces = true

label-unfocused-background = ${colors.background-alt}
label-unfocused-foreground = ${colors.primary}

label-mode = %mode%
label-mode-padding = 1
label-mode-background = ${colors.alert}

label-focused = %name%
label-focused-foreground = ${colors.primary}
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-padding = 1

label-visible = %name%
label-visible-underline = ${colors.secondary}
label-visible-padding = 1

label-urgent = %index%
label-urgent-foreground = ${colors.alert}
label-urgent-background = ${colors.background-alt}
label-urgent-underline = ${colors.alert}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#E0E0E0}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = %{F#E0E0E0}VOL%{F-} OFF
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/battery]
type = internal/battery
full-at = 99
low-at = 10
poll-interval = 5
label-charging = %{F#E0E0E0}BAT%{F-} ^ %percentage%%
label-discharging = %{F#E0E0E0}BAT%{F-} v %percentage%%
label-full = %{F#E0E0E0}BAT%{F-} FULL
label-low = %{F#E0E0E0}BAT%{F-} LOW
; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP1

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#E0E0E0}%ifname%%{F#606060} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#E0E0E0}%ifname%%{F-} %essid% %local_ip%
click-left = nm-connection-editor
format-disconnected =

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#E0E0E0}%ifname%%{F-} %local_ip%
click-left = nm-connection-editor
format-disconnected =

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/microphone]
type = custom/script
exec = pactl get-source-mute @DEFAULT_SOURCE@ | awk '/yes/ {print "OFF"} /no/ {print "ON"}'
interval = 1
format-prefix = "MIC "
format-prefix-foreground = ${colors.primary}
click-left = pactl set-source-mute @DEFAULT_SOURCE@ toggle

[settings]
screenchange-reload = true
pseudo-transparency = true

